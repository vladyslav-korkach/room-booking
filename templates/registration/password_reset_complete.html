{% extends "main/base.html" %}
{% load static %}

{% block title %}Пароль змінено{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'main/css/login.css' %}">
{% endblock %}

{% block content %}
<main class="auth-page">
  <section class="auth-section py-5 py-lg-6">
    <div class="container" style="max-width: 760px;">
      <div class="auth-form-card">
        <div class="auth-form-header">
          <span class="auth-form-kicker">Password Reset</span>
          <h1 class="auth-form-title mt-2 mb-2">Пароль оновлено</h1>
          <p class="auth-form-text mb-4">
            Ваш пароль успішно змінено. Тепер можна увійти з новими даними.
          </p>
          <a href="{% url 'login' %}" class="btn auth-submit-btn">
            Увійти
          </a>
        </div>
      </div>
    </div>
  </section>
</main>
{% endblock %}
