{% load static %}
<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %}HotelFlow{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
    {% block extra_css %}{% endblock %}
  </head>

  <body class="bg-dark text-light">
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary py-3"
    >
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">HotelFlow</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
          aria-controls="nav"
          aria-expanded="false"
          aria-label="Відкрити навігацію"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div id="nav" class="collapse navbar-collapse">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">Головна</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/hotels/">Готелі</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#benefits">Переваги</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#account">Кабінет</a>
            </li>
          </ul>

          <button class="btn btn-light nav-login-btn">Увійти</button>
        </div>
      </div>
    </nav>

    {% block content %} {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
